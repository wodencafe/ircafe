plugins {
    id 'java'
    id 'checkstyle'
    alias(libs.plugins.springBoot)
    alias(libs.plugins.springDependencyManagement)
    alias(libs.plugins.jpackage)

    // Clean + consistent
    alias(libs.plugins.spotless)

    // Supply-chain / security
    alias(libs.plugins.dependencyCheck)
    alias(libs.plugins.cyclonedx)

    // Keep deps tidy
    alias(libs.plugins.dependencyAnalysis)
    alias(libs.plugins.benManesVersions)
    alias(libs.plugins.openRewrite)

    alias(libs.plugins.spotbugs)
    alias(libs.plugins.errorprone)
    alias(libs.plugins.forbiddenapis)
    alias(libs.plugins.dependencyLicenseReport)
}

group = 'cafe.woden'
description = 'IRC Client in modern Java, utilizing PircBotX, Spring Boot, and RXJava.'
ext.javaRelease = 25

def libsCatalog = extensions.getByType(org.gradle.api.artifacts.VersionCatalogsExtension).named("libs")
def lib = { String alias -> libsCatalog.findLibrary(alias).get() }
def catalogVersion = { String alias -> libsCatalog.findVersion(alias).get().requiredVersion }
def springModulithVersion = providers.gradleProperty('springModulithVersion').getOrElse(catalogVersion('springModulith'))
def flatlafVersion = providers.gradleProperty('flatlafVersion').getOrElse(catalogVersion('flatlaf'))
def darklafVersion = providers.gradleProperty('darklafVersion').getOrElse(catalogVersion('darklaf'))

// Keep the root build declarative; move behavior-heavy logic into concern-based scripts.
apply from: rootProject.file('gradle/versioning.gradle')
apply from: rootProject.file('gradle/java-conventions.gradle')
apply from: rootProject.file('gradle/quality.gradle')
apply from: rootProject.file('gradle/testing.gradle')
apply from: rootProject.file('gradle/packaging.gradle')

rewrite {
    // Keep recipes opt-in and export datatables for review when refactors run.
    exportDatatables = true
}

dependencies {
    compileOnly lib('lombok')
    annotationProcessor lib('lombok')
    testCompileOnly lib('lombok')
    testAnnotationProcessor lib('lombok')
    functionalTestCompileOnly lib('lombok')
    functionalTestAnnotationProcessor lib('lombok')

    implementation lib('jmoleculesDdd')
    implementation lib('jmoleculesLayeredArchitecture')
    implementation lib('jmoleculesHexagonalArchitecture')
    implementation platform("org.springframework.modulith:spring-modulith-bom:${springModulithVersion}")
    implementation lib('springModulithStarterCore')

    errorprone lib('errorproneCore')
    implementation lib('soundlibsMp3spi')
    implementation lib('soundlibsJlayer')
    implementation lib('soundlibsTritonusShare')
    implementation lib('twoSlices')
    implementation lib('springBootStarter')

    implementation lib('springBootStarterJdbc')
    implementation lib('flywayCore')
    runtimeOnly lib('flywayDatabaseHsqldb')
    runtimeOnly lib('hsqldb')

    developmentOnly lib('springBootDevtools')
    annotationProcessor lib('springBootConfigurationProcessor')

    implementation lib('snakeyaml')
    implementation lib('jacksonDatabind')

    implementation lib('rxjava')
    implementation lib('pircbotx')
    implementation lib('caffeine')
    implementation lib('fastutil')

    implementation lib('modernDockingApi')
    implementation lib('modernDockingSingleApp')
    implementation lib('modernDockingUi')

    implementation "com.formdev:flatlaf:${flatlafVersion}"
    implementation "com.formdev:flatlaf-extras:${flatlafVersion}"
    implementation "com.formdev:flatlaf-intellij-themes:${flatlafVersion}"
    implementation "com.github.weisj:darklaf-core:${darklafVersion}"

    implementation lib('autocomplete')
    implementation(lib('languageToolEn')) {
        exclude group: "com.sun.xml.bind", module: "jaxb-core"
        exclude group: "com.sun.xml.bind", module: "jaxb-impl"
    }

    implementation lib('webpImageio')
    implementation lib('animatedGifLib')

    implementation lib('miglayoutSwing')

    implementation lib('jsoup')

    // Better tray support on Linux/GNOME (AppIndicator/GtkStatusIcon fallback) + native menus.
    // NOTE: Maven Central currently publishes 4.4 (README mentions 4.5, but it is not on Central).
    implementation lib('systemTray')

    // Cross-platform desktop notification popups (toast-like). Used for Windows notifications.
    implementation lib('notify')

    // DBus (Linux/GNOME) - used to implement clickable desktop notifications via org.freedesktop.Notifications.
    implementation lib('dbusJavaCore')
    implementation lib('dbusJavaTransportNativeUnixsocket')

    testImplementation lib('archunitJunit5')
    testImplementation lib('springBootStarterTest')
    testImplementation lib('springModulithStarterTest')
    testImplementation lib('testcontainers')
    testRuntimeOnly lib('junitPlatformLauncher')

    // Focused mutation testing for ignore normalization + irssi option parsing compatibility.
    mutationTestTool lib('pitestCommandLine')
    mutationTestTool lib('pitestJunit5Plugin')
}
